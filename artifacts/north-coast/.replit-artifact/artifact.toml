kind = "web"
previewPath = "/"
title = "North Coast Property Maintenance"
version = "1.0.0"
id = "artifacts/north-coast"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25276

[services.development]
run = "pnpm --filter @workspace/north-coast run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/north-coast", "run", "build" ]
publicDir = "artifacts/north-coast/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25276"
BASE_PATH = "/"
